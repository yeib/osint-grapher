name: Deploy to shinyapps.io

on:
  push:
    branches:
      - main
    paths:
      # Solo hacemos deploy si cambian archivos relevantes de la app web
      - 'shinyapp/**'
      - 'deploy_shinyapps.R'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy Shiny App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalar R y dependencias del sistema
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      # Instalar dependencias de R
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rsconnect, any::shiny, any::bslib, any::shinyjs, any::igraph, any::visNetwork, any::ggplot2, any::ggraph, any::ggrepel
          needs: check
          cache-version: 2

      # Ejecutar el script de despliegue usando los secretos de GitHub
      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript deploy_shinyapps.R
